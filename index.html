        async function encryptData(t){const k=await getCryptoKey(),iv=window.crypto.getRandomValues(new Uint8Array(12)),enc=await window.crypto.subtle.encrypt({name:"AES-GCM",iv:iv},k,new TextEncoder().encode(t));return{cipher:btoa(String.fromCharCode.apply(null,new Uint8Array(enc))),iv:btoa(String.fromCharCode.apply(null,iv))}}
        async function decryptData(c,i){try{const k=await getCryptoKey(),iv=new Uint8Array(atob(i).split("").map(x=>x.charCodeAt(0))),dec=await window.crypto.subtle.decrypt({name:"AES-GCM",iv:iv},k,new Uint8Array(atob(c).split("").map(x=>x.charCodeAt(0))));return new TextDecoder().decode(dec)}catch(e){return"🔓 ပြန်ဖြည်၍မရပါ"}}
        async function postJob(){const c=document.getElementById('jobCompany').value,t=document.getElementById('jobTitle').value,s=document.getElementById('jobSalary').value,l=document.getElementById('jobLocation').value,p=document.getElementById('jobPhone').value,cat=document.getElementById('jobCategory').value;if(!c||!t||!p){alert('အချက်အလက် မပြည့်စုံပါ');return}const enc=await encryptData(p);const{error}=await _supabase.from('jobs').insert([{company:c,title:t,salary:s,location:l,phone:enc.cipher,iv:enc.iv,category:cat}]);if(error)alert(error.message);else{alert('🎉 တင်ပြီးပါပြီ');window.location.reload()}}
        async function submitCVAndMatch(){const n=document.getElementById('seekerName').value,p=document.getElementById('seekerPhone').value,sk=document.getElementById('seekerSkill').value;if(!n||!p){alert('အမည်နှင့် ဖုန်းဖြည့်ပါ');return}const enc=await encryptData(p);await _supabase.from('cv_submissions').insert([{name:n,phone:enc.cipher,iv:enc.iv,skill:sk}]);const{data}=await _supabase.from('jobs').select('*').eq('category',sk);const con=document.getElementById('jobContainer');con.innerHTML='';if(data&&data.length>0){for(const job of data){const phone=await decryptData(job.phone,job.iv);const card=document.createElement('div');card.className='job-card';const t=document.createElement('div');t.className='job-title';t.textContent=`${job.title} (${job.company})`;const sal=document.createElement('div');sal.className='job-info';sal.textContent=`💰 လစာ: ${job.salary}`;const loc=document.createElement('div');loc.className='job-info';loc.textContent=`📍 နေရာ: ${job.location}`;const btn=document.createElement('a');btn.className='apply-btn';btn.href=`tel:${phone}`;btn.textContent='📞 ဖုန်းခေါ်ဆိုလျှောက်ထားရန်';card.appendChild(t);card.appendChild(sal);card.appendChild(loc);card.appendChild(btn);con.appendChild(card)}}else{const p=document.createElement('p');p.style.cssText='font-size:12px;color:#64748b;text-align:center;';p.textContent='ကိုက်ညီမည့်အလုပ် မရှိသေးပါ';con.appendChild(p)}}
    </script>
